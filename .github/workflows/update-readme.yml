name: update-readme

on:
  push:
    branches: [main]
    paths:
      - 'locales/**'

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # BOT_PAT lets the workflow push directly to a protected
          # main (admin bypass). Falls back to GITHUB_TOKEN which
          # would be blocked by branch protection — kept for diag.
          token: ${{ secrets.BOT_PAT }}
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: python tools/update_readme.py

      - name: Commit + push if changed
        run: |
          if git diff --quiet README.md; then
            echo "README unchanged — nothing to push"
            exit 0
          fi
          git config user.name  "kiekr-i18n-bot"
          git config user.email "bot@kiekr.local"
          git add README.md
          git commit -m "docs: auto-update completion table"
          git push origin HEAD:main

      - name: Prune prior runs of this workflow
        if: always()
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          REPO: ${{ github.repository }}
          WF: ${{ github.workflow }}
          CURRENT: ${{ github.run_id }}
        run: |
          gh run list --repo "$REPO" --workflow "$WF" \
            --limit 100 --json databaseId \
            --jq ".[] | select(.databaseId != $CURRENT) | .databaseId" |
            while read -r id; do
              [ -n "$id" ] && gh run delete --repo "$REPO" "$id" || true
            done

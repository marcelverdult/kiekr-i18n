name: validate

on:
  pull_request:
    paths:
      - 'locales/**'
      - 'schema/**'
      - 'tools/validate.py'
      - '.github/workflows/validate.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install jsonschema
      - run: python tools/validate.py
      - run: python tools/safety_check.py

name: validate

on:
  pull_request:
    paths:
      - 'locales/**'
      - 'schema/**'
      - 'tools/validate.py'
      - '.github/workflows/validate.yml'

permissions:
  contents: read
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install jsonschema
      - run: python tools/validate.py
      - run: python tools/safety_check.py

      - name: Prune prior runs of this workflow
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WF: ${{ github.workflow }}
          CURRENT: ${{ github.run_id }}
        run: |
          gh run list --repo "$REPO" --workflow "$WF" \
            --limit 100 --json databaseId \
            --jq ".[] | select(.databaseId != $CURRENT) | .databaseId" |
            while read -r id; do
              [ -n "$id" ] && gh run delete --repo "$REPO" "$id" || true
            done

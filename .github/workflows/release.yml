name: release

on:
  push:
    branches: [main]
    paths:
      - 'locales/**'

permissions:
  contents: write
  actions: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: meta
        run: |
          DATE=$(date -u +%Y.%m.%d)
          SHA=$(git rev-parse --short HEAD)
          TAG="v${DATE}-${SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Package locales
        run: |
          tar -C . -czf kiekr-i18n.tar.gz locales/
          sha256sum kiekr-i18n.tar.gz > kiekr-i18n.tar.gz.sha256
          cat kiekr-i18n.tar.gz.sha256

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body: |
            Auto-cut translation snapshot. KiekR app release builds
            fetch the latest tag from this workflow.
          files: |
            kiekr-i18n.tar.gz
            kiekr-i18n.tar.gz.sha256
          fail_on_unmatched_files: true

      - name: Prune prior runs of this workflow
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WF: ${{ github.workflow }}
          CURRENT: ${{ github.run_id }}
        run: |
          gh run list --repo "$REPO" --workflow "$WF" \
            --limit 100 --json databaseId \
            --jq ".[] | select(.databaseId != $CURRENT) | .databaseId" |
            while read -r id; do
              [ -n "$id" ] && gh run delete --repo "$REPO" "$id" || true
            done

      - name: Prune older releases (keep latest only)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          KEEP: ${{ steps.meta.outputs.tag }}
        run: |
          gh release list --repo "$REPO" --limit 100 \
            --json tagName --jq ".[].tagName" |
            while read -r tag; do
              if [ "$tag" != "$KEEP" ] && [ -n "$tag" ]; then
                gh release delete --repo "$REPO" "$tag" --cleanup-tag --yes || true
              fi
            done

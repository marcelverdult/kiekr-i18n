name: nightly-fill

# Nightly safety net: materialize any missing keys (sync) then DeepL-fill
# every `null` (seed), and open a PR. Catches gaps the push-triggered
# seed-translations.yml misses — e.g. keys left unseeded when a prior
# DeepL batch errored out. seed.py only ever writes to `null` entries,
# so human / already-AI-seeded text is never touched (enforced by the
# guard in seed.py and the bot-PR check in validate.yml).

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC nightly (cron is always UTC)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fill:
    runs-on: ubuntu-latest
    steps:
      - name: Register DEEPL_API_KEY as masked
        run: echo "::add-mask::${{ secrets.DEEPL_API_KEY }}"
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install deepl
      - name: Materialize missing-key placeholders
        run: python tools/sync_keys.py
      - name: DeepL-fill every null
        run: python tools/seed.py
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
      - name: Open PR with nightly fills
        uses: peter-evans/create-pull-request@v7
        with:
          # Prefer BOT_PAT so the PR triggers downstream workflows
          # (validate.yml). Falls back to GITHUB_TOKEN if no PAT —
          # PR will still open but the required `check` won't run
          # automatically; close+reopen the PR to trigger it.
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          branch: bot/nightly-fill
          delete-branch: true
          title: "chore(seed): nightly DeepL fill for missing keys"
          commit-message: "chore(seed): nightly DeepL fill for missing keys"
          body: |
            Nightly machine-translated seeds for keys that were `null`.
            Only `null` entries are filled — human (`_human`) and
            already-AI-seeded (`_ai`) text is never overwritten. Each
            new value is flagged `_ai: true` until a human reviews it.

            Review tips:
              - Skim for placeholder integrity (`%1$s`, `%@`).
              - Glossary terms went through `glossary/<lang>.tsv`.
              - Flip `_ai: true` to `_human: true` (or replace the
                whole object with a plain string) on approval.
          labels: bot, ai-seed
